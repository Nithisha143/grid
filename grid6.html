<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            height:30vh;
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
        }
        .child1{
            background-color: lightpink;
            grid-column:1/3;
        }
        .child2{
            background-color: lightgreen;
        }
        .child3{
            background-color:lightskyblue ;
        }
        .child4{
            background-color: lightseagreen;
        }
        .child5{
            background-color: lightgreen;
        }
        .child6{
            background-color: lightblue;
        }
        .child8{
            background-color: lightgrey;
            grid-column:1/3;
            grid-row:3/5;
        }
        .child9{
            background-color: lightpink;
        }
        .child10{
            background-color: lightsalmon;
        }
        .child11{
            background-color: lightskyblue;
        }
        .child12{
            background-color: lightseagreen;
            grid-column:1/4;
        }
        .child13{
            background-color: lightcoral;
        }

    </style>
</head>
<body>
    <div class="parent">
        <div class="child1">1</div>
        <div class="child2">2</div>
        <div class="child3">3</div>
        <div class="child4">4</div>
        <div class="child5">5</div>
        <div class="child6">6</div>
        <div class="child7">7</div>
        <div class="child8">8</div>
        <div class="child9">9</div>
        <div class="child10">10</div>
        <div class="child11">11</div>
        <div class="child12">12</div>
        <div class="child13">13</div>
    </div> 
</body>
</html>
